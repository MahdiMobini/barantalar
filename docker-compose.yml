services:
  db:
    image: postgres:15
    container_name: talar_db
    # اینجا اسم کلیدهای دیتابیس رو با کلیدهای فایل .env شما هماهنگ کردم
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: talar_backend
    env_file:
      - .env
    # مقادیری که در زیر می‌نویسیم، مقادیر داخل .env را نادیده می‌گیرند و برای داکر تنظیم می‌شوند
    environment:
      DB_HOST: db
      MEDIA_ROOT: /app/media
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://frontend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./gentle-giant-coder-main
      dockerfile: Dockerfile
    container_name: talar_frontend
    depends_on:
      - backend
    ports:
      - "80:4173"

volumes:
  postgres_data: